services:
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: ghostwriter-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage:Z
    environment:
      - QDRANT__SERVICE__ENABLE_STATIC_CONTENT=true
    restart: unless-stopped

volumes:
  qdrant_storage:
